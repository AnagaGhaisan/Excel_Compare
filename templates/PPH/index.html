<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Ekualisasi PPh 23</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input[type="file"] { display: block; width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; background-color: #f9f9f9; }
        .btn-submit { width: 100%; background-color: #007bff; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 4px; cursor: pointer; transition: 0.3s; margin-top: 10px; font-weight: bold; }
        .btn-submit:hover { background-color: #0056b3; }
        .info-text { font-size: 14px; color: #666; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistem Ekualisasi PPh 23</h2>
    <p class="info-text">Bandingkan file Rincian Bukti Potong dengan Voucher Category (General Ledger) berdasarkan No. SPF.</p>
    
    <form action="/ekualisasi-pph23" method="POST" enctype="multipart/form-data">
        
        <div class="form-group">
            <label for="file_bupot">1. Upload Rincian Bukti Potong (.xlsx)</label>
            <input type="file" id="file_bupot" name="file_bupot" accept=".xlsx, .xls" required>
        </div>
        
        <div class="form-group">
            <label for="file_voucher">2. Upload Voucher Category / Data GL (.xlsx)</label>
            <input type="file" id="file_voucher" name="file_voucher" accept=".xlsx, .xls" required>
        </div>
        
        <button type="submit" class="btn-submit">Proses Ekualisasi & Download</button>
    </form>
</div>

</body>
</html>
